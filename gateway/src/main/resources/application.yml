spring:
  security:
    oauth2:
      client:
        registration:
          gateway:
            provider: keycloak
            client-id: gateway
            client-secret: ${KEYCLOAK_CLIENT_SECRET_OF_GATEWAY}
            scope:
              - openid
              - profile
              - email
              - offline_access
            authorization-grant-type: authorization_code
            redirect-uri: "https://api.reybo.ru/login/oauth2/code/gateway"

        provider:
          keycloak:
            issuer-uri: https://auth.reybo.ru/realms/shop
            user-name-attribute: preferred_name

      resourceserver:
        jwt:
          issuer-uri: https://auth.reybo.ru/realms/shop

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: frontend-crm
              uri: http://frontend-crm:3000
              predicates:
                - Host=crm.reybo.ru
              filters:
                - TokenRelay=

#            - id: api-crm
#              uri: lb://api-crm
#              predicates:
#                - Host=api.crm.reybo.ru
#              filters:
#                - TokenRelay=

            - id: frontend-shop
              uri: http://frontend-shop:3000
              predicates:
                - Host=reybo.ru
              filters:
                - TokenRelay=

#            - id: api-shop
#              uri: lb://api-shop
#              predicates:
#                - Host=api.shop.reybo.ru
#              filters:
#                - TokenRelay=

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:localhost}

server:
  port: 8765
  forward-headers-strategy: native
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.springframework.security.oauth2: TRACE
    org.springframework.web.reactive.function.client: TRACE