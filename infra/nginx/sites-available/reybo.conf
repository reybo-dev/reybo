server {
    listen 80;
    server_name reybo.ru api.reybo.ru auth.reybo.ru api.crm.reybo.ru api.shop.reybo.ru crm.reybo.ru;
    return 301 https://$host$request_uri;
}

# Основной сервер (API Gateway)
server {
    listen 443 ssl;
    server_name reybo.ru api.reybo.ru api.crm.reybo.ru api.shop.reybo.ru crm.reybo.ru;

    ssl_certificate /etc/letsencrypt/live/reybo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reybo.ru/privkey.pem;

    location / {
        proxy_pass http://localhost:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Важно для OAuth2 сессий
        proxy_cookie_path / "/; HTTPOnly; Secure; SameSite=None";
    }
}

# Keycloak сервер
server {
    listen 443 ssl;
    server_name auth.reybo.ru;

    ssl_certificate /etc/letsencrypt/live/reybo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reybo.ru/privkey.pem;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}